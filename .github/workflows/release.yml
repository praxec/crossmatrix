name: release

# Tag-triggered publish to crates.io. Push an annotated tag whose version
# matches the workspace version, e.g.:
#   git tag -a v0.1.0 -m "crossmatrix 0.1.0" && git push origin v0.1.0
#
# Requires repo secret CARGO_REGISTRY_TOKEN (a crates.io API token with
# publish-new + publish-update scope).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: gate + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag version: $tag / workspace version: $ws"
          if [ "$tag" != "$ws" ]; then
            echo "::error::tag v$tag does not match [workspace.package] version $ws — bump the version or re-tag."
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      # crossmatrix-mcp depends on crossmatrix, so the core must be published and
      # available in the index first. `cargo publish` blocks until the crate is
      # available, so a plain sequential publish is correct.
      - name: Publish crossmatrix (core)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p crossmatrix

      - name: Publish crossmatrix-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Core was just published; cargo waits for availability, but allow a few
          # retries to absorb any extra index-propagation delay before the dep
          # (crossmatrix = "0.1.0") resolves during the mcp's verify build.
          for i in 1 2 3 4 5; do
            if cargo publish -p crossmatrix-mcp; then
              exit 0
            fi
            echo "attempt $i failed; waiting 30s for the index to propagate..."
            sleep 30
          done
          echo "::error::crossmatrix-mcp failed to publish after retries"
          exit 1
